aid: fanuc-robotics
name: FANUC
description: >-
  FANUC Corporation is a Japanese multinational headquartered in Oshino,
  Yamanashi at the base of Mount Fuji, and is one of the world's largest
  suppliers of factory automation, industrial robots, and CNC (computer
  numerical control) systems. Founded in 1972 after spinning out of Fujitsu's
  numerical control division (originated 1955) under Seiuemon Inaba, FANUC
  pioneered commercial NC and CNC technology and by the early 1980s held
  roughly half of the global CNC market. The company operates three primary
  business segments: FA (CNC systems, servo motors, lasers, and PMC controls
  for machine tools), Robot (industrial arms from the LR Mate and M-series
  through the heavy-payload M-2000iA, plus the CRX collaborative robot
  family), and ROBOMACHINE (ROBODRILL machining centers, ROBOCUT wire EDM,
  and ROBOSHOT all-electric injection molding machines). FANUC's primary
  developer surface is FOCAS (FANUC Open CNC API Specification), a licensed
  C/C++ library (fwlib32.dll) used by machine builders and MES/OEE vendors
  to read CNC state over Ethernet, plus KAREL and Teach Pendant (TP)
  programming on the robot controllers and a published ROS 2 driver for the
  CRX collaborative arms. FANUC does not operate a public REST developer
  portal or publish OpenAPI specifications; integrations are partner-driven
  through MTConnect adapters, OPC UA servers, FIELD system edge apps, and
  the FANUC America customer/training portals.
